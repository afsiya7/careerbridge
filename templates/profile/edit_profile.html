{% extends 'base.html' %}

{% block content %}

<style>

    .edit-profile-container{
        max-width:700px;
        margin:50px auto;
    }

    .edit-profile-card{
        background:white;
        padding:45px;
        border-radius:30px;
        box-shadow:0 15px 35px rgba(255,79,163,0.15);
    }

    .edit-title{
        text-align:center;
        color:#ff4fa3;
        font-size:2.5rem;
        font-weight:800;
        margin-bottom:10px;
    }

    .edit-subtitle{
        text-align:center;
        color:#222222;
        font-size:14px;
        margin-bottom:35px;
    }

    form p{
        margin-bottom:20px;
    }

    form label{
        display:block;
        margin-bottom:8px;
        color:#222222;
        font-weight:700;
    }

    form input,
    form select,
    form textarea{
        width:100%;
        padding:14px;
        border:2px solid #ffd6e8;
        border-radius:15px;
        outline:none;
        font-weight:600;
        transition:.3s;
        background:#ffffff;
    }

    form input:focus,
    form select:focus,
    form textarea:focus{
        border-color:#ff69b4;
        box-shadow:0 0 12px rgba(255,105,180,0.25);
    }

    input[type="file"]{
        cursor:pointer;
    }

    textarea{
        min-height:120px;
        resize:vertical;
    }

    .update-btn{
        width:100%;
        margin-top:15px;
        padding:14px;
        border:none;
        border-radius:15px;
        background:linear-gradient(
            135deg,
            #ff4fa3,
            #ff69b4
        );
        color:white;
        font-weight:700;
        font-size:16px;
        transition:.3s;
    }

    .update-btn:hover{
        transform:translateY(-3px);
        box-shadow:0 10px 20px rgba(255,79,163,0.25);
    }

</style>

<div class="edit-profile-container">

    <div class="edit-profile-card">

        <h2 class="edit-title">
            Edit Profile 💖
        </h2>

        <p class="edit-subtitle">
            Update your information, skills, resume, and professional details.
        </p>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="update-btn">
                Update Profile
            </button>

        </form>

    </div>

</div>

{% endblock %}
