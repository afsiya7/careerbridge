{% extends 'base.html' %}

{% block content %}

<style>

    .register-container{
        max-width:600px;
        margin:50px auto;
    }

    .register-card{
        background:white;
        padding:40px;
        border-radius:30px;
        box-shadow:0 15px 35px rgba(255,79,163,0.15);
    }

    .register-title{
        text-align:center;
        color:#ff4fa3;
        font-size:2.5rem;
        font-weight:800;
        margin-bottom:10px;
    }

    .register-subtitle{
        text-align:center;
        color:#222222;
        font-size:14px;
        margin-bottom:30px;
    }

    form p{
        margin-bottom:20px;
    }

    form label{
        display:block;
        color:#222222;
        font-weight:700;
        margin-bottom:8px;
    }

    form input,
    form select,
    form textarea{
        width:100%;
        padding:14px;
        border:2px solid #ffd6e8;
        border-radius:15px;
        outline:none;
        font-weight:600;
        transition:.3s;
    }

    form input:focus,
    form select:focus,
    form textarea:focus{
        border-color:#ff69b4;
        box-shadow:0 0 12px rgba(255,105,180,0.2);
    }

    .register-btn{
        width:100%;
        margin-top:10px;
        background:linear-gradient(
            135deg,
            #ff4fa3,
            #ff69b4
        );
        color:white;
        border:none;
        padding:14px;
        border-radius:15px;
        font-weight:700;
        transition:.3s;
    }

    .register-btn:hover{
        transform:translateY(-3px);
        box-shadow:0 10px 20px rgba(255,79,163,0.25);
    }

</style>

<div class="register-container">

    <div class="register-card">

        <h2 class="register-title">
            Create Account 
        </h2>

        <p class="register-subtitle">
            Join CareerBridge and start building your professional journey.
        </p>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="register-btn">
                Register
            </button>

        </form>

    </div>

</div>

{% endblock %}
